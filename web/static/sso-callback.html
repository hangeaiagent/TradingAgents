<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents - SSO Login</title>
<style>
:root { --bg: #0f1117; --text: #e0e0e0; --accent: #4ecdc4; --border: #2a2a4a; }
[data-theme="light"] { --bg: #f5f5f7; --text: #1a1a2e; --accent: #0d9488; --border: #d1d5db; }
body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.msg { text-align: center; }
.msg h2 { color: var(--accent); margin-bottom: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<script>(function(){var s=localStorage.getItem('ta_theme');var p=window.matchMedia('(prefers-color-scheme:dark)').matches;var t=s||(p?'dark':'light');document.documentElement.setAttribute('data-theme',t)})()</script>
<div class="msg">
  <div class="spinner"></div>
  <h2>SSO</h2>
  <p id="status"></p>
</div>
<script>
(function() {
  var hash = window.location.hash;
  // Clear sensitive token from URL immediately
  if (history.replaceState) {
    history.replaceState(null, '', window.location.pathname);
  }

  if (hash && hash.indexOf('token=') !== -1) {
    // SSO success — session cookie already set by backend, just redirect
    document.getElementById('status').textContent = 'SSO success, redirecting...';
    sessionStorage.setItem('sso_completed', '1');
    window.location.replace('/');
  } else {
    // SSO failed
    document.getElementById('status').textContent = 'SSO failed, redirecting to login...';
    sessionStorage.setItem('sso_attempted', '1');
    setTimeout(function() { window.location.replace('/'); }, 1500);
  }
})();
</script>
</body>
</html>
