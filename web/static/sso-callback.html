<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents - SSO Login</title>
<style>
body { background: #0f1117; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.msg { text-align: center; }
.msg h2 { color: #4ecdc4; margin-bottom: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid #2a2a4a; border-top-color: #4ecdc4; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <h2>SSO</h2>
  <p id="status"></p>
</div>
<script>
(function() {
  var hash = window.location.hash;
  // Clear sensitive token from URL immediately
  if (history.replaceState) {
    history.replaceState(null, '', window.location.pathname);
  }

  if (hash && hash.indexOf('token=') !== -1) {
    // SSO success — session cookie already set by backend, just redirect
    document.getElementById('status').textContent = 'SSO success, redirecting...';
    sessionStorage.setItem('sso_completed', '1');
    window.location.replace('/');
  } else {
    // SSO failed
    document.getElementById('status').textContent = 'SSO failed, redirecting to login...';
    sessionStorage.setItem('sso_attempted', '1');
    setTimeout(function() { window.location.replace('/'); }, 1500);
  }
})();
</script>
</body>
</html>
