<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents - Billing</title>
<style>
:root {
  --bg: #0f1117; --card: #1a1a2e; --border: #2a2a4a;
  --text: #e0e0e0; --muted: #888; --dim: #555;
  --accent: #4ecdc4; --accent2: #44a08d;
  --green: #2d6a4f; --red: #6a2d2d; --yellow: #6a6a2d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Header ──────────────────────────────────────────── */
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 14px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.header-left { display: flex; align-items: center; gap: 16px; }
.header-left h1 { font-size: 22px; color: #fff; }
.header-left h1 span { color: var(--accent); }
.header-left h1 a { color: inherit; text-decoration: none; }
.page-title { font-size: 14px; color: var(--muted); border-left: 1px solid var(--border); padding-left: 16px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.user-chip { display: flex; align-items: center; gap: 8px; background: rgba(78,205,196,0.08); border: 1px solid rgba(78,205,196,0.2); border-radius: 20px; padding: 4px 14px 4px 4px; font-size: 13px; color: #ccc; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; font-weight: 600; overflow: hidden; }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.lang-switch { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.lang-switch button { background: transparent; border: none; color: var(--muted); font-size: 12px; padding: 4px 10px; cursor: pointer; transition: .2s; }
.lang-switch button.active { background: var(--accent); color: #fff; }
.btn-header { color: var(--muted); font-size: 12px; text-decoration: none; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; transition: .2s; }
.btn-header:hover { color: #fff; border-color: var(--accent); }

/* ── Container ───────────────────────────────────────── */
.container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

/* ── Profile card ────────────────────────────────────── */
.profile-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; margin-bottom: 24px; display: flex; align-items: center; gap: 18px; }
.profile-avatar-lg { width: 56px; height: 56px; border-radius: 50%; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; font-weight: 600; overflow: hidden; flex-shrink: 0; }
.profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
.profile-name { font-size: 18px; font-weight: 600; color: #fff; }
.profile-email { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* ── Stat cards ──────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
.stat-val { font-size: 26px; font-weight: 700; color: #fff; }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── Section ─────────────────────────────────────────── */
.billing-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px 26px; margin-bottom: 24px; }
.section-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }

/* ── Tables ──────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; color: var(--accent); padding: 8px 12px; border-bottom: 1px solid var(--border); font-weight: 500; font-size: 12px; }
td { padding: 7px 12px; color: #bbb; border-bottom: 1px solid rgba(42,42,74,0.4); font-size: 13px; }
tr:hover td { background: rgba(78,205,196,0.03); }
.dec-BUY { color: var(--accent); font-weight: 600; }
.dec-SELL { color: #ff6b6b; font-weight: 600; }
.dec-HOLD { color: #ffd93d; font-weight: 600; }

/* ── Filter bar ──────────────────────────────────────── */
.filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
.filter-bar input, .filter-bar select {
  padding: 7px 12px; background: var(--bg); border: 1px solid #333; border-radius: 6px;
  color: #fff; font-size: 13px; outline: none; transition: border-color .2s;
}
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
.filter-bar input::placeholder { color: var(--dim); }
.filter-count { font-size: 12px; color: var(--dim); margin-left: auto; }

/* ── Empty state ─────────────────────────────────────── */
.empty { text-align: center; padding: 40px 20px; color: var(--dim); font-size: 14px; }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .container { padding: 16px 10px; }
  .profile-card { flex-direction: column; text-align: center; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .filter-bar { flex-direction: column; }
  .user-chip .user-email { display: none; }
}
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────── -->
<div class="header">
  <div class="header-left">
    <h1><a href="/"><span>Trading</span>Agents</a></h1>
    <div class="page-title" id="txt-page-title"></div>
  </div>
  <div class="header-right">
    <div class="user-chip" id="user-chip" style="display:none">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name-display"></span>
    </div>
    <div class="lang-switch">
      <button id="btn-zh" onclick="setLang('zh')">ZH</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <a href="/feedback" class="btn-header" id="txt-feedback"></a>
    <a href="/" class="btn-header" id="txt-back"></a>
    <a href="/api/auth/logout" class="btn-header" id="txt-logout"></a>
  </div>
</div>

<div class="container">
  <!-- Profile -->
  <div class="profile-card" id="profile-card" style="display:none">
    <div class="profile-avatar-lg" id="profile-avatar"></div>
    <div>
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-email" id="profile-email"></div>
    </div>
  </div>

  <!-- Cumulative stats -->
  <div class="stat-grid" id="stat-grid"></div>

  <!-- Monthly billing -->
  <div class="billing-section">
    <div class="section-title" id="title-monthly"></div>
    <div id="monthly-content"></div>
  </div>

  <!-- Usage detail -->
  <div class="billing-section">
    <div class="section-title">
      <span id="title-detail"></span>
    </div>
    <div class="filter-bar" id="filter-bar">
      <input type="text" id="filter-ticker" placeholder="NVDA">
      <input type="month" id="filter-month">
      <select id="filter-decision">
        <option value="" id="opt-all-dec"></option>
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
        <option value="HOLD">HOLD</option>
      </select>
      <div class="filter-count" id="filter-count"></div>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   i18n
   ═══════════════════════════════════════════════════════ */
const I18N = {
  zh: {
    pageTitle: '账户与账单',
    back: '返回分析', logout: '退出', feedback: '问题反馈',
    cumAnalyses: '累计分析次数', cumTokensIn: '累计输入 Token', cumTokensOut: '累计输出 Token',
    cumLlm: '累计 LLM 调用', cumTime: '累计使用时长',
    monthly: '月度账单',
    mMonth: '月份', mAnalyses: '分析次数', mTokensIn: '输入 Token', mTokensOut: '输出 Token',
    mLlm: 'LLM 调用', mTools: '工具调用', mTime: '使用时长',
    detail: '使用明细',
    allDecisions: '全部决策',
    dDate: '日期', dTicker: '股票', dDecision: '决策',
    dTokensIn: '输入 Token', dTokensOut: '输出 Token',
    dLlm: 'LLM', dTools: '工具', dTime: '耗时', dModel: '模型',
    filterPlaceholder: '搜索股票代码...',
    showing: '显示', of: '/', records: '条记录',
    noData: '暂无使用记录',
  },
  en: {
    pageTitle: 'Account & Billing',
    back: 'Back to Analysis', logout: 'Logout', feedback: 'Feedback',
    cumAnalyses: 'Total Analyses', cumTokensIn: 'Total Input Tokens', cumTokensOut: 'Total Output Tokens',
    cumLlm: 'Total LLM Calls', cumTime: 'Total Time',
    monthly: 'Monthly Billing',
    mMonth: 'Month', mAnalyses: 'Analyses', mTokensIn: 'Input Tokens', mTokensOut: 'Output Tokens',
    mLlm: 'LLM Calls', mTools: 'Tool Calls', mTime: 'Time Used',
    detail: 'Usage Details',
    allDecisions: 'All Decisions',
    dDate: 'Date', dTicker: 'Ticker', dDecision: 'Decision',
    dTokensIn: 'Input Tokens', dTokensOut: 'Output Tokens',
    dLlm: 'LLM', dTools: 'Tools', dTime: 'Time', dModel: 'Model',
    filterPlaceholder: 'Search ticker...',
    showing: 'Showing', of: '/', records: 'records',
    noData: 'No usage records yet',
  }
};

let lang = localStorage.getItem('ta_lang') || 'zh';
function t(k) { return (I18N[lang] || I18N.zh)[k] || k; }

function setLang(l) {
  lang = l;
  localStorage.setItem('ta_lang', l);
  applyI18n();
  if (cachedData) renderAll(cachedData);
}

function applyI18n() {
  document.getElementById('txt-page-title').textContent = t('pageTitle');
  document.getElementById('txt-back').textContent = t('back');
  document.getElementById('txt-feedback').textContent = t('feedback');
  document.getElementById('txt-logout').textContent = t('logout');
  document.getElementById('title-monthly').textContent = t('monthly');
  document.getElementById('title-detail').textContent = t('detail');
  document.getElementById('filter-ticker').placeholder = t('filterPlaceholder');
  document.getElementById('opt-all-dec').textContent = t('allDecisions');
  document.getElementById('btn-zh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
}

/* ═══════════════════════════════════════════════════════
   Data
   ═══════════════════════════════════════════════════════ */
let cachedData = null;
let allRecords = [];

async function loadData() {
  try {
    const resp = await fetch('/api/user/info');
    if (resp.status === 401) { window.location.href = '/'; return; }
    if (!resp.ok) return;
    cachedData = await resp.json();
    allRecords = (cachedData.usage.records || []).slice().reverse();
    renderAll(cachedData);
  } catch (e) { /* ignore */ }
}

/* ═══════════════════════════════════════════════════════
   Rendering
   ═══════════════════════════════════════════════════════ */
function renderAll(data) {
  renderUserChip(data);
  renderProfile(data);
  renderStats(data.usage);
  renderMonthly(data.usage.monthly || []);
  applyFilters();
}

function renderUserChip(info) {
  const chip = document.getElementById('user-chip');
  const avatar = document.getElementById('user-avatar');
  const nameEl = document.getElementById('user-name-display');
  const displayName = info.name || info.email || 'User';
  if (info.avatar) {
    avatar.innerHTML = '<img src="' + esc(info.avatar) + '" alt="">';
  } else {
    avatar.textContent = displayName.charAt(0).toUpperCase();
  }
  const email = info.email || '';
  if (email) {
    nameEl.innerHTML = escH(displayName) + ' <span class="user-email" style="color:#666;font-size:11px">' + escH(email) + '</span>';
  } else {
    nameEl.textContent = displayName;
  }
  chip.style.display = 'flex';
}

function renderProfile(info) {
  const card = document.getElementById('profile-card');
  const av = document.getElementById('profile-avatar');
  const displayName = info.name || info.email || 'User';
  if (info.avatar) {
    av.innerHTML = '<img src="' + esc(info.avatar) + '" alt="">';
  } else {
    av.textContent = displayName.charAt(0).toUpperCase();
  }
  document.getElementById('profile-name').textContent = displayName;
  document.getElementById('profile-email').textContent = info.email || '';
  card.style.display = 'flex';
}

function renderStats(usage) {
  const totalSec = Math.round((usage.total_time_ms || 0) / 1000);
  const grid = document.getElementById('stat-grid');
  grid.innerHTML = [
    [usage.total_analyses || 0, t('cumAnalyses')],
    [fmtNum(usage.total_tokens_in || 0), t('cumTokensIn')],
    [fmtNum(usage.total_tokens_out || 0), t('cumTokensOut')],
    [fmtNum(usage.total_llm_calls || 0), t('cumLlm')],
    [fmtTime(totalSec), t('cumTime')],
  ].map(([v, l]) =>
    '<div class="stat-card"><div class="stat-val">' + v + '</div><div class="stat-lbl">' + l + '</div></div>'
  ).join('');
}

function renderMonthly(monthly) {
  const el = document.getElementById('monthly-content');
  if (!monthly.length) { el.innerHTML = '<div class="empty">' + t('noData') + '</div>'; return; }
  let html = '<table><thead><tr>'
    + [t('mMonth'), t('mAnalyses'), t('mTokensIn'), t('mTokensOut'), t('mLlm'), t('mTools'), t('mTime')]
      .map(h => '<th>' + h + '</th>').join('')
    + '</tr></thead><tbody>';
  for (const m of monthly) {
    const sec = Math.round((m.total_time_ms || 0) / 1000);
    html += '<tr>'
      + '<td style="font-weight:600;color:#fff">' + m.month + '</td>'
      + '<td>' + m.analyses + '</td>'
      + '<td>' + fmtNum(m.tokens_in) + '</td>'
      + '<td>' + fmtNum(m.tokens_out) + '</td>'
      + '<td>' + m.llm_calls + '</td>'
      + '<td>' + m.tool_calls + '</td>'
      + '<td>' + fmtTime(sec) + '</td>'
      + '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function applyFilters() {
  const ticker = document.getElementById('filter-ticker').value.trim().toUpperCase();
  const month = document.getElementById('filter-month').value;   // "2026-03" or ""
  const decision = document.getElementById('filter-decision').value; // "BUY" etc or ""

  const filtered = allRecords.filter(r => {
    if (ticker && !(r.ticker || '').toUpperCase().includes(ticker)) return false;
    if (month && !(r.timestamp || '').startsWith(month)) return false;
    if (decision) {
      const dec = (r.decision || '').replace(/[^A-Z]/g, '');
      const d = dec.includes('BUY') ? 'BUY' : dec.includes('SELL') ? 'SELL' : 'HOLD';
      if (d !== decision) return false;
    }
    return true;
  });

  document.getElementById('filter-count').textContent =
    t('showing') + ' ' + filtered.length + ' ' + t('of') + ' ' + allRecords.length + ' ' + t('records');

  renderDetail(filtered);
}

function renderDetail(records) {
  const el = document.getElementById('detail-content');
  if (!records.length) { el.innerHTML = '<div class="empty">' + t('noData') + '</div>'; return; }

  let html = '<table><thead><tr>'
    + [t('dDate'), t('dTicker'), t('dDecision'), t('dTokensIn'), t('dTokensOut'), t('dLlm'), t('dTools'), t('dTime'), t('dModel')]
      .map(h => '<th>' + h + '</th>').join('')
    + '</tr></thead><tbody>';

  for (const r of records) {
    const dec = (r.decision || '').replace(/[^A-Z]/g, '');
    const d = dec.includes('BUY') ? 'BUY' : dec.includes('SELL') ? 'SELL' : 'HOLD';
    const secs = Math.round((r.elapsed_ms || 0) / 1000);
    html += '<tr>'
      + '<td>' + (r.trade_date || '') + '</td>'
      + '<td style="font-weight:600">' + (r.ticker || '') + '</td>'
      + '<td class="dec-' + d + '">' + d + '</td>'
      + '<td>' + fmtNum(r.tokens_in) + '</td>'
      + '<td>' + fmtNum(r.tokens_out) + '</td>'
      + '<td>' + (r.llm_calls || 0) + '</td>'
      + '<td>' + (r.tool_calls || 0) + '</td>'
      + '<td>' + secs + 's</td>'
      + '<td style="font-size:11px;color:#666">' + (r.model || '') + '</td>'
      + '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   Utilities
   ═══════════════════════════════════════════════════════ */
function escH(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function esc(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function fmtNum(n) {
  if (n == null) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}
function fmtTime(sec) {
  if (sec < 60) return sec + 's';
  const m = Math.floor(sec / 60), s = sec % 60;
  if (m < 60) return m + 'm ' + s + 's';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

/* ═══════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════ */
// Filter event listeners
document.getElementById('filter-ticker').addEventListener('input', applyFilters);
document.getElementById('filter-month').addEventListener('change', applyFilters);
document.getElementById('filter-decision').addEventListener('change', applyFilters);

applyI18n();
loadData();
</script>
<!-- Evolvr 用户反馈 Widget -->
<script
  src="https://evolvr.agentpit.io/widget/feedback-widget.js"
  data-api="https://evolvr.agentpit.io/api/feedback"
  data-app-id="3846ced7-3eee-4df7-bcd1-049064d0af61"
  async>
</script>
</body>
</html>
