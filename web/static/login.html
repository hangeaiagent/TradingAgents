<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents - Login</title>
<style>
:root {
  --bg: #0f1117; --card: #1a1a2e; --border: #2a2a4a;
  --text: #e0e0e0; --muted: #888; --dim: #555;
  --accent: #4ecdc4; --accent2: #44a08d;
}
[data-theme="light"] {
  --bg: #f5f7fa; --card: #ffffff; --border: #e0e0e0;
  --text: #1a1a2e; --muted: #666; --dim: #999;
  --accent: #2a9d8f; --accent2: #348a7a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

.login-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 48px 40px; text-align: center; max-width: 420px; width: 90%;
}
.logo h1 { font-size: 32px; color: var(--text); margin-bottom: 6px; }
.logo h1 span { color: var(--accent); }
.logo .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
.divider { height: 1px; background: var(--border); margin: 0 0 32px; }
.login-hint { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.btn-login {
  display: inline-block; padding: 14px 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none;
  border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s; text-decoration: none; letter-spacing: 0.5px;
}
.btn-login:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }
.lang-switch { margin-top: 24px; display: flex; justify-content: center; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; display: inline-flex; }
.lang-switch button { background: transparent; border: none; color: var(--muted); font-size: 12px; padding: 4px 14px; cursor: pointer; transition: .2s; }
.lang-switch button.active { background: var(--accent); color: #fff; }
.theme-toggle-btn { background: none; border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 1.2rem; padding: 4px 10px; border-radius: 6px; transition: background 0.2s; line-height: 1; margin-top: 12px; }
.theme-toggle-btn:hover { background: rgba(78,205,196,0.1); }
.footer { margin-top: 32px; color: var(--dim); font-size: 12px; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <h1><span>Trading</span>Agents</h1>
    <div class="subtitle" id="txt-subtitle"></div>
  </div>
  <div class="divider"></div>
  <div class="login-hint" id="txt-hint"></div>
  <div id="sso-status" style="display:none; margin-bottom:16px; color:#4ecdc4; font-size:13px;"></div>
  <a class="btn-login" href="/api/auth/agentpit/login" id="txt-btn"></a>
  <div style="margin-top:20px;">
    <div class="lang-switch">
      <button id="btn-zh" onclick="setLang('zh')">ZH</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <br>
    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle theme">🌙</button>
  </div>
</div>
<div class="footer">Powered by TradingAgents v0.2.1</div>

<script>
const I18N = {
  zh: {
    subtitle: 'AI 驱动的多智能体股票分析',
    hint: '请通过 AgentPit 平台授权登录后使用股票分析功能',
    btn: 'agentpit 授权登陆',
    sso_trying: '正在尝试自动登录...',
  },
  en: {
    subtitle: 'AI-Powered Multi-Agent Stock Analysis',
    hint: 'Please login via AgentPit to access the stock analysis platform',
    btn: 'agentpit Login',
    sso_trying: 'Attempting auto-login...',
  }
};
let lang = localStorage.getItem('ta_lang') || 'zh';
function setLang(l) { lang = l; localStorage.setItem('ta_lang', l); apply(); }
function apply() {
  const s = I18N[lang] || I18N.zh;
  document.getElementById('txt-subtitle').textContent = s.subtitle;
  document.getElementById('txt-hint').textContent = s.hint;
  document.getElementById('txt-btn').textContent = s.btn;
  document.getElementById('btn-zh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
}
apply();

/* ── SSO Auto-Login (anti-loop: each session attempts at most once) ── */
(function() {
  // Check URL for sso_error flag (callback returned error)
  var params = new URLSearchParams(window.location.search);
  if (params.get('sso_error')) {
    sessionStorage.setItem('sso_attempted', '1');
    if (history.replaceState) history.replaceState(null, '', '/');
    return;
  }
  // If already attempted SSO this session or came from agentpit.io with referrer, skip
  if (sessionStorage.getItem('sso_attempted') || sessionStorage.getItem('sso_completed')) {
    return;
  }
  // Attempt SSO once
  sessionStorage.setItem('sso_attempted', '1');
  var s = I18N[lang] || I18N.zh;
  var el = document.getElementById('sso-status');
  el.textContent = s.sso_trying;
  el.style.display = 'block';
  window.location.replace('/api/auth/agentpit/sso');
})();
</script>
<!-- Evolvr 用户反馈 Widget -->
<script
  src="https://evolvr.agentpit.io/widget/feedback-widget.js"
  data-api="https://evolvr.agentpit.io/api/feedback"
  data-app-id="3846ced7-3eee-4df7-bcd1-049064d0af61"
  async>
</script>
</body>
</html>
