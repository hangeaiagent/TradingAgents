<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents - Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

.login-card {
  background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px;
  padding: 48px 40px; text-align: center; max-width: 420px; width: 90%;
}
.logo h1 { font-size: 32px; color: #fff; margin-bottom: 6px; }
.logo h1 span { color: #4ecdc4; }
.logo .subtitle { color: #888; font-size: 14px; margin-bottom: 36px; }
.divider { height: 1px; background: #2a2a4a; margin: 0 0 32px; }
.login-hint { color: #888; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.btn-login {
  display: inline-block; padding: 14px 40px;
  background: linear-gradient(135deg, #4ecdc4, #44a08d); color: #fff; border: none;
  border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s; text-decoration: none; letter-spacing: 0.5px;
}
.btn-login:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }
.lang-switch { margin-top: 24px; display: flex; justify-content: center; gap: 0; border: 1px solid #2a2a4a; border-radius: 6px; overflow: hidden; display: inline-flex; }
.lang-switch button { background: transparent; border: none; color: #888; font-size: 12px; padding: 4px 14px; cursor: pointer; transition: .2s; }
.lang-switch button.active { background: #4ecdc4; color: #fff; }
.footer { margin-top: 32px; color: #555; font-size: 12px; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <h1><span>Trading</span>Agents</h1>
    <div class="subtitle" id="txt-subtitle"></div>
  </div>
  <div class="divider"></div>
  <div class="login-hint" id="txt-hint"></div>
  <a class="btn-login" href="/api/auth/login" id="txt-btn"></a>
  <div style="margin-top:20px;">
    <div class="lang-switch">
      <button id="btn-zh" onclick="setLang('zh')">ZH</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>
<div class="footer">Powered by TradingAgents v0.2.1</div>

<script>
const I18N = {
  zh: {
    subtitle: 'AI 驱动的多智能体股票分析',
    hint: '请通过 AgentPit 平台授权登录后使用股票分析功能',
    btn: 'AgentPit 授权登录',
  },
  en: {
    subtitle: 'AI-Powered Multi-Agent Stock Analysis',
    hint: 'Please login via AgentPit to access the stock analysis platform',
    btn: 'Login with AgentPit',
  }
};
let lang = localStorage.getItem('ta_lang') || 'zh';
function setLang(l) { lang = l; localStorage.setItem('ta_lang', l); apply(); }
function apply() {
  const s = I18N[lang] || I18N.zh;
  document.getElementById('txt-subtitle').textContent = s.subtitle;
  document.getElementById('txt-hint').textContent = s.hint;
  document.getElementById('txt-btn').textContent = s.btn;
  document.getElementById('btn-zh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
}
apply();
</script>
</body>
</html>
