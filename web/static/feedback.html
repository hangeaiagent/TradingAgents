<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents - My Feedback</title>
<script>(function(){var s=localStorage.getItem('theme'),d=window.matchMedia('(prefers-color-scheme:dark)').matches,t=s||(d?'dark':'light');document.documentElement.setAttribute('data-theme',t)})()</script>
<style>
:root {
  --bg: #0f1117; --card: #1a1a2e; --border: #2a2a4a;
  --text: #e0e0e0; --muted: #888; --dim: #555;
  --accent: #4ecdc4; --accent2: #44a08d;
  --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
  --blue: #3b82f6; --purple: #8b5cf6; --gray: #6b7280;
}
[data-theme="light"] {
  --bg: #f5f5f7; --card: #ffffff; --border: #d1d5db;
  --text: #1a1a2e; --muted: #6b7280; --dim: #9ca3af;
  --accent: #0d9488; --accent2: #14b8a6;
  --green: #16a34a; --red: #dc2626; --yellow: #ca8a04;
  --blue: #2563eb; --purple: #7c3aed; --gray: #4b5563;
}
[data-theme="light"] .header { background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%); }
[data-theme="light"] .header-left h1 { color: #1a1a2e; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Header ──────────────────────────────────────────── */
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 14px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.header-left { display: flex; align-items: center; gap: 16px; }
.header-left h1 { font-size: 22px; color: #fff; } .header-left h1 span { color: var(--accent); }
.header-left h1 a { color: inherit; text-decoration: none; }
.page-title { font-size: 14px; color: var(--muted); border-left: 1px solid var(--border); padding-left: 16px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.lang-switch { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.lang-switch button { background: transparent; border: none; color: var(--muted); font-size: 12px; padding: 4px 10px; cursor: pointer; transition: .2s; }
.lang-switch button.active { background: var(--accent); color: #fff; }
.btn-header { color: var(--muted); font-size: 12px; text-decoration: none; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; transition: .2s; }
.btn-header:hover { color: #fff; border-color: var(--accent); }

/* ── Container ───────────────────────────────────────── */
.container { max-width: 1000px; margin: 0 auto; padding: 28px 20px; }

/* ── Notification bar ────────────────────────────────── */
.notif-bar { background: rgba(78,205,196,0.06); border: 1px solid rgba(78,205,196,0.15); border-radius: 10px; padding: 12px 20px; margin-bottom: 20px; display: none; align-items: center; gap: 10px; font-size: 13px; color: var(--accent); }
.notif-bar .notif-count { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.notif-bar .notif-dismiss { margin-left: auto; cursor: pointer; color: var(--dim); font-size: 16px; }
.notif-bar .notif-dismiss:hover { color: var(--text); }

/* ── Empty state ─────────────────────────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--dim); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; margin-bottom: 4px; }

/* ── Loading ─────────────────────────────────────────── */
.loading { text-align: center; padding: 40px; color: var(--dim); font-size: 14px; }

/* ── Feedback list ───────────────────────────────────── */
.feedback-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: border-color .2s; }
.feedback-card:hover { border-color: rgba(78,205,196,.3); }
.feedback-row { display: flex; align-items: flex-start; padding: 16px 20px; cursor: pointer; gap: 14px; flex-wrap: wrap; }
.fb-desc { flex: 1; min-width: 200px; }
.fb-desc-text { font-size: 14px; color: #ddd; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.fb-meta { font-size: 11px; color: var(--dim); margin-top: 6px; }
.fb-status { flex-shrink: 0; }
.status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; color: #fff; white-space: nowrap; }
.status-submitted   { background: var(--gray); }
.status-processing  { background: var(--yellow); color: #000; }
.status-fixed       { background: var(--blue); }
.status-planned     { background: var(--purple); }
.status-deployed    { background: var(--green); }
.status-deploy_failed { background: var(--red); }
.status-duplicate   { background: var(--gray); }
.status-error       { background: var(--red); }

/* ── Detail panel ────────────────────────────────────── */
.feedback-detail { display: none; border-top: 1px solid var(--border); padding: 16px 20px; background: rgba(15,17,23,0.5); }
.feedback-detail.open { display: block; }
.detail-section { margin-bottom: 14px; }
.detail-section h4 { font-size: 13px; color: var(--accent); margin-bottom: 6px; font-weight: 500; }
.detail-section p { font-size: 13px; color: #bbb; line-height: 1.6; }
.detail-section .resolution { background: rgba(78,205,196,0.06); border: 1px solid rgba(78,205,196,0.12); border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #ccc; line-height: 1.6; white-space: pre-wrap; }
.detail-loading { font-size: 12px; color: var(--dim); padding: 8px 0; }

/* ── Refresh button ──────────────────────────────────── */
.refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.refresh-bar h2 { font-size: 16px; color: #fff; font-weight: 600; }
.btn-refresh { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: .2s; }
.btn-refresh:hover { color: #fff; border-color: var(--accent); }

@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .container { padding: 16px 12px; }
  .feedback-row { padding: 12px 14px; }
}
</style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────── -->
<div class="header">
  <div class="header-left">
    <h1><a href="/"><span>Trading</span>Agents</a></h1>
    <div class="page-title" id="page-title"></div>
  </div>
  <div class="header-right">
    <button id="theme-toggle" onclick="toggleTheme()" title="切换主题" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:1.3em;padding:6px;"><span id="theme-icon">🌙</span></button>
    <div class="lang-switch">
      <button id="btn-zh" onclick="setLang('zh')">ZH</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <a href="/" class="btn-header" id="btn-back"></a>
  </div>
</div>

<!-- ── Main container ────────────────────────────────── -->
<div class="container">

  <!-- Notification bar -->
  <div class="notif-bar" id="notif-bar">
    <span class="notif-count" id="notif-count"></span>
    <span id="notif-text"></span>
    <span class="notif-dismiss" onclick="dismissNotifs()">&times;</span>
  </div>

  <!-- Refresh bar -->
  <div class="refresh-bar">
    <h2 id="list-title"></h2>
    <button class="btn-refresh" onclick="loadFeedbacks()" id="btn-refresh"></button>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="loading" id="loading"></div>
  </div>

</div>

<script>
function toggleTheme() {
  var c = document.documentElement.getAttribute('data-theme');
  var n = c === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('theme', n);
  updateThemeIcon(n);
}
function updateThemeIcon(t) {
  var i = document.getElementById('theme-icon');
  if (i) i.textContent = t === 'dark' ? '🌙' : '☀️';
}
updateThemeIcon(document.documentElement.getAttribute('data-theme') || 'dark');

/* ═══════════════════════════════════════════════════════
   i18n
   ═══════════════════════════════════════════════════════ */
const I18N = {
  zh: {
    pageTitle: '问题反馈',
    back: '返回首页',
    listTitle: '我的反馈',
    refresh: '刷新',
    loading: '加载中...',
    emptyIcon: '&#128172;',
    emptyTitle: '暂无反馈记录',
    emptyDesc: '点击页面右下角的紫色按钮提交问题反馈',
    submittedAt: '提交于',
    updatedAt: '更新于',
    detailStatus: '当前状态',
    detailResolution: '处理说明',
    detailProposal: '解决方案',
    detailProposalStatus: '方案状态',
    detailLoading: '加载详情中...',
    processing: '处理中...',
    notifText: '条新通知',
    notifNew: '条未读通知',
    approved: '已批准',
    rejected: '已拒绝',
    pending: '待审核',
  },
  en: {
    pageTitle: 'Feedback',
    back: 'Back',
    listTitle: 'My Feedback',
    refresh: 'Refresh',
    loading: 'Loading...',
    emptyIcon: '&#128172;',
    emptyTitle: 'No feedback yet',
    emptyDesc: 'Click the purple button at the bottom-right to submit feedback',
    submittedAt: 'Submitted',
    updatedAt: 'Updated',
    detailStatus: 'Status',
    detailResolution: 'Resolution',
    detailProposal: 'Proposal',
    detailProposalStatus: 'Proposal Status',
    detailLoading: 'Loading details...',
    processing: 'Processing...',
    notifText: 'new notification(s)',
    notifNew: 'unread notification(s)',
    approved: 'Approved',
    rejected: 'Rejected',
    pending: 'Pending',
  }
};

let lang = localStorage.getItem('ta_lang') || 'zh';
function t(k) { return (I18N[lang] || I18N.zh)[k] || k; }
function setLang(l) { lang = l; localStorage.setItem('ta_lang', l); applyI18n(); }

function applyI18n() {
  document.getElementById('btn-zh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
  document.getElementById('page-title').textContent = t('pageTitle');
  document.getElementById('btn-back').textContent = t('back');
  document.getElementById('list-title').textContent = t('listTitle');
  document.getElementById('btn-refresh').textContent = t('refresh');
  document.getElementById('loading').textContent = t('loading');
}

/* ═══════════════════════════════════════════════════════
   Config
   ═══════════════════════════════════════════════════════ */
const EVOLVR_API = 'https://evolvr.agentpit.io';
let userId = null;

/* ═══════════════════════════════════════════════════════
   Init — get user info
   ═══════════════════════════════════════════════════════ */
async function init() {
  try {
    const resp = await fetch('/api/user/info');
    if (resp.status === 401) { window.location.href = '/'; return; }
    const data = await resp.json();
    userId = data.user_id;
    if (userId) {
      loadFeedbacks();
      checkNotifications();
    } else {
      showEmpty();
    }
  } catch (e) {
    showEmpty();
  }
}

/* ═══════════════════════════════════════════════════════
   Load feedbacks
   ═══════════════════════════════════════════════════════ */
let feedbacksData = [];

async function loadFeedbacks() {
  const content = document.getElementById('content');
  content.innerHTML = `<div class="loading">${t('loading')}</div>`;

  try {
    const resp = await fetch(`${EVOLVR_API}/api/feedbacks?user_id=${encodeURIComponent(userId)}`);
    if (!resp.ok) { showEmpty(); return; }
    feedbacksData = await resp.json();
    if (!Array.isArray(feedbacksData) || feedbacksData.length === 0) { showEmpty(); return; }
    renderList();
  } catch (e) {
    showEmpty();
  }
}

function renderList() {
  const content = document.getElementById('content');
  content.innerHTML = feedbacksData.map((fb, i) => `
    <div class="feedback-card" id="card-${i}">
      <div class="feedback-row" onclick="toggleDetail(${i}, '${esc(fb.feedbackId)}')">
        <div class="fb-desc">
          <div class="fb-desc-text">${esc(fb.description)}</div>
          <div class="fb-meta">
            ${t('submittedAt')} ${fmtDate(fb.submittedAt)}
            &middot; ${t('updatedAt')} ${fmtDate(fb.updatedAt)}
          </div>
        </div>
        <div class="fb-status">
          <span class="status-badge status-${fb.status}">${esc(fb.statusText)}</span>
        </div>
      </div>
      <div class="feedback-detail" id="detail-${i}"></div>
    </div>
  `).join('');
}

function showEmpty() {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="icon">${t('emptyIcon')}</div>
      <p><b>${t('emptyTitle')}</b></p>
      <p>${t('emptyDesc')}</p>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════
   Detail toggle
   ═══════════════════════════════════════════════════════ */
const detailCache = {};

async function toggleDetail(idx, feedbackId) {
  const el = document.getElementById(`detail-${idx}`);
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    return;
  }

  // Close others
  document.querySelectorAll('.feedback-detail.open').forEach(d => d.classList.remove('open'));

  el.classList.add('open');

  if (detailCache[feedbackId]) {
    el.innerHTML = renderDetail(detailCache[feedbackId]);
    return;
  }

  el.innerHTML = `<div class="detail-loading">${t('detailLoading')}</div>`;

  try {
    const [statusResp, proposalResp] = await Promise.all([
      fetch(`${EVOLVR_API}/api/feedback/${feedbackId}/status`),
      fetch(`${EVOLVR_API}/api/proposals/${feedbackId}`).catch(() => null),
    ]);

    const status = statusResp.ok ? await statusResp.json() : null;
    const proposal = proposalResp && proposalResp.ok ? await proposalResp.json() : null;

    const detail = { status, proposal };
    detailCache[feedbackId] = detail;
    el.innerHTML = renderDetail(detail);
  } catch (e) {
    el.innerHTML = `<div class="detail-loading" style="color:var(--red);">Failed to load details</div>`;
  }
}

function renderDetail({ status, proposal }) {
  let html = '';

  if (status) {
    html += `
      <div class="detail-section">
        <h4>${t('detailStatus')}</h4>
        <p><span class="status-badge status-${status.status}">${esc(status.statusText)}</span></p>
      </div>
    `;
    if (status.resolution) {
      html += `
        <div class="detail-section">
          <h4>${t('detailResolution')}</h4>
          <div class="resolution">${esc(status.resolution)}</div>
        </div>
      `;
    }
  }

  if (proposal && proposal.content) {
    const decisionText = proposal.author_decision === 'approved' ? t('approved')
      : proposal.author_decision === 'rejected' ? t('rejected') : t('pending');
    html += `
      <div class="detail-section">
        <h4>${t('detailProposal')}</h4>
        <div class="resolution">${esc(proposal.content)}</div>
      </div>
      <div class="detail-section">
        <h4>${t('detailProposalStatus')}</h4>
        <p>${esc(proposal.status)} (${decisionText})</p>
      </div>
    `;
  }

  if (!html) {
    html = `<div class="detail-section"><p style="color:var(--dim)">${t('processing')}</p></div>`;
  }

  return html;
}

/* ═══════════════════════════════════════════════════════
   Notifications
   ═══════════════════════════════════════════════════════ */
async function checkNotifications() {
  try {
    const resp = await fetch(`${EVOLVR_API}/api/notifications?user_id=${encodeURIComponent(userId)}&unread=true`);
    if (!resp.ok) return;
    const notifs = await resp.json();
    if (Array.isArray(notifs) && notifs.length > 0) {
      const bar = document.getElementById('notif-bar');
      document.getElementById('notif-count').textContent = notifs.length;
      document.getElementById('notif-text').textContent = `${notifs.length} ${t('notifNew')}`;
      bar.style.display = 'flex';

      // Mark all as read
      for (const n of notifs) {
        fetch(`${EVOLVR_API}/api/notifications/${n.id}/read`, { method: 'POST' }).catch(() => {});
      }
    }
  } catch (e) { /* ignore */ }
}

function dismissNotifs() {
  document.getElementById('notif-bar').style.display = 'none';
}

/* ═══════════════════════════════════════════════════════
   Utilities
   ═══════════════════════════════════════════════════════ */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function fmtDate(s) {
  if (!s) return '-';
  try { return new Date(s).toLocaleString(); } catch (e) { return s; }
}

/* ═══════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════ */
applyI18n();
init();
</script>
<!-- Evolvr 用户反馈 Widget -->
<script
  id="evolvr-widget"
  src="https://evolvr.agentpit.io/widget/feedback-widget.js"
  data-api="https://evolvr.agentpit.io/api/feedback"
  data-app-id="3846ced7-3eee-4df7-bcd1-049064d0af61"
  async>
</script>
<script>
  fetch('/api/user/info').then(r => r.json()).then(data => {
    if (data.user_id) {
      var ws = document.getElementById('evolvr-widget');
      if (ws) ws.setAttribute('data-user-id', data.user_id);
    }
  }).catch(() => {});
</script>
</body>
</html>
