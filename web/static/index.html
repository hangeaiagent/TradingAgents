<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents - AI Stock Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #0f1117; --card: #1a1a2e; --border: #2a2a4a;
  --text: #e0e0e0; --muted: #888; --dim: #555;
  --accent: #4ecdc4; --accent2: #44a08d;
  --green: #2d6a4f; --red: #6a2d2d; --yellow: #6a6a2d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Header ─────────────────────────────────────────── */
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 14px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.header-left h1 { font-size: 22px; color: #fff; }
.header-left h1 span { color: var(--accent); }
.header-left .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.user-chip { display: flex; align-items: center; gap: 8px; background: rgba(78,205,196,0.08); border: 1px solid rgba(78,205,196,0.2); border-radius: 20px; padding: 4px 14px 4px 4px; font-size: 13px; color: #ccc; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; font-weight: 600; overflow: hidden; }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.lang-switch { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.lang-switch button { background: transparent; border: none; color: var(--muted); font-size: 12px; padding: 4px 10px; cursor: pointer; transition: .2s; }
.lang-switch button.active { background: var(--accent); color: #fff; }
.user-chip { cursor: pointer; position: relative; }
.user-chip:hover { border-color: var(--accent); }
.btn-header { color: var(--muted); font-size: 12px; text-decoration: none; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; transition: .2s; }
.btn-header:hover { color: #fff; border-color: var(--accent); }

/* ── User dropdown menu ──────────────────────────────── */
.user-menu-wrap { position: relative; display: none; }
.user-menu-wrap.show { display: block; }
.user-dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 8px; min-width: 180px; box-shadow: 0 6px 20px rgba(0,0,0,.4); z-index: 50; overflow: hidden; }
.user-dropdown.open { display: block; }
.user-dropdown a { display: flex; align-items: center; gap: 8px; padding: 10px 16px; color: #ccc; text-decoration: none; font-size: 13px; transition: background .15s; }
.user-dropdown a:hover { background: rgba(78,205,196,0.08); color: #fff; }
.user-dropdown a .menu-icon { color: var(--accent); font-size: 14px; width: 18px; text-align: center; }

/* ── Container ──────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

/* ── Usage bar ──────────────────────────────────────── */
.usage-bar { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 24px; margin-bottom: 20px; }
.usage-summary { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
.usage-item { font-size: 13px; color: var(--muted); }
.usage-item b { color: var(--accent); font-weight: 600; margin-right: 2px; }
.usage-toggle { margin-left: auto; font-size: 12px; color: var(--dim); cursor: pointer; user-select: none; transition: .2s; }
.usage-toggle:hover { color: var(--accent); }
.usage-history { display: none; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; overflow-x: auto; }
.usage-history.open { display: block; }
.usage-history table { width: 100%; border-collapse: collapse; font-size: 12px; }
.usage-history th { text-align: left; color: var(--accent); padding: 6px 10px; border-bottom: 1px solid var(--border); font-weight: 500; }
.usage-history td { padding: 5px 10px; color: #bbb; border-bottom: 1px solid rgba(42,42,74,0.5); }
.usage-history .dec-BUY { color: var(--accent); } .usage-history .dec-SELL { color: #ff6b6b; } .usage-history .dec-HOLD { color: #ffd93d; }

/* ── Form ───────────────────────────────────────────── */
.form-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.form-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
.form-group { flex: 1; min-width: 130px; }
.form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select {
  width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid #333; border-radius: 8px;
  color: #fff; font-size: 14px; outline: none; transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group input::placeholder { color: var(--dim); }
.btn-analyze {
  padding: 9px 28px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; white-space: nowrap; height: 40px;
}
.btn-analyze:hover { opacity: .85; } .btn-analyze:disabled { opacity: .4; cursor: not-allowed; }

/* ── Progress panel ─────────────────────────────────── */
.progress-panel { display: none; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
.progress-panel.active { display: block; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.progress-title { font-size: 14px; font-weight: 600; color: #ccc; }
.progress-elapsed { font-size: 13px; color: var(--dim); font-variant-numeric: tabular-nums; }

.timeline { display: flex; flex-direction: column; gap: 4px; }
.tl-stage { margin-bottom: 6px; }
.tl-stage-header { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; font-weight: 600; color: var(--muted); }
.tl-stage-header.active { color: var(--accent); }
.tl-stage-header.done { color: var(--green); }
.tl-agent { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0 3px 24px; font-size: 12px; color: var(--dim); transition: color .3s; }
.tl-agent.done { color: #aaa; }
.tl-agent.active { color: var(--accent); }
.tl-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
.tl-icon-pending { width: 8px; height: 8px; border: 1.5px solid var(--dim); border-radius: 50%; }
.tl-icon-active { width: 10px; height: 10px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }
.tl-icon-done { color: var(--accent); font-size: 13px; line-height: 1; }
@keyframes spin { to { transform: rotate(360deg); } }
.tl-name { font-weight: 500; white-space: nowrap; }
.tl-preview { color: var(--dim); font-size: 11px; margin-top: 2px; max-height: 32px; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; word-break: break-all; }

/* ── Decision banner ────────────────────────────────── */
.decision-banner { display: none; border-radius: 12px; padding: 22px 28px; margin-bottom: 20px; text-align: center; }
.decision-banner.show { display: block; }
.decision-banner.BUY { background: linear-gradient(135deg, #1a3a2a, #0f2a1a); border: 1px solid var(--green); }
.decision-banner.SELL { background: linear-gradient(135deg, #3a1a1a, #2a0f0f); border: 1px solid var(--red); }
.decision-banner.HOLD { background: linear-gradient(135deg, #3a3a1a, #2a2a0f); border: 1px solid var(--yellow); }
.decision-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.decision-value { font-size: 34px; font-weight: 700; margin-top: 4px; }
.decision-banner.BUY .decision-value { color: var(--accent); }
.decision-banner.SELL .decision-value { color: #ff6b6b; }
.decision-banner.HOLD .decision-value { color: #ffd93d; }
.decision-meta { color: var(--muted); font-size: 13px; margin-top: 6px; }

/* ── Token usage bar (after result) ─────────────────── */
.token-bar { display: none; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 24px; margin-bottom: 20px; }
.token-bar.show { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
.token-item { font-size: 13px; color: var(--muted); }
.token-item b { color: #ccc; font-weight: 600; }

/* ── Report ──────────────────────────────────────────── */
.report { display: none; } .report.show { display: block; }
.section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
.section-header { padding: 14px 22px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; transition: background .2s; }
.section-header:hover { background: #222244; }
.section-title { font-size: 15px; font-weight: 600; }
.section-arrow { color: #666; transition: transform .2s; font-size: 12px; }
.section-header.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; border-top: 1px solid var(--border); } .section-body.open { display: block; }
.item { padding: 18px 22px; border-bottom: 1px solid #1f1f3a; }
.item:last-child { border-bottom: none; }
.item-name { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
.item-content { font-size: 14px; line-height: 1.75; color: #ccc; word-wrap: break-word; }
.item-content h1 { font-size: 20px; color: #fff; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.item-content h2 { font-size: 17px; color: #fff; margin: 18px 0 8px; }
.item-content h3 { font-size: 15px; color: #ddd; margin: 14px 0 6px; }
.item-content h4, .item-content h5, .item-content h6 { font-size: 14px; color: #ccc; margin: 12px 0 6px; }
.item-content p { margin: 8px 0; }
.item-content strong, .item-content b { color: #fff; }
.item-content em { color: #bbb; font-style: italic; }
.item-content ul, .item-content ol { margin: 8px 0; padding-left: 24px; }
.item-content li { margin: 4px 0; }
.item-content li::marker { color: var(--accent); }
.item-content blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 10px 0; background: rgba(78,205,196,0.04); color: #aaa; }
.item-content code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; color: #e0b0ff; }
.item-content pre { background: #0d0d1a; border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 10px 0; overflow-x: auto; }
.item-content pre code { background: none; padding: 0; font-size: 12px; color: #ccc; }
.item-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
.item-content th { background: #222; color: var(--accent); padding: 8px 12px; border: 1px solid var(--border); text-align: left; font-weight: 500; }
.item-content td { padding: 7px 12px; border: 1px solid var(--border); color: #bbb; }
.item-content tr:hover td { background: rgba(78,205,196,0.03); }
.item-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.item-content a { color: var(--accent); text-decoration: underline; }

/* ── Download bar ──────────────────────────────────────── */
.download-bar { display: none; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 22px; margin-bottom: 20px; }
.download-bar.show { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.download-bar .dl-label { font-size: 13px; color: var(--muted); }
.btn-download {
  padding: 6px 16px; background: transparent; border: 1px solid var(--border); border-radius: 6px;
  color: var(--accent); font-size: 12px; font-weight: 500; cursor: pointer; transition: .2s; text-decoration: none;
}
.btn-download:hover { background: rgba(78,205,196,0.1); border-color: var(--accent); }

/* ── Error ───────────────────────────────────────────── */
.error-box { display: none; background: #2a0f0f; border: 1px solid var(--red); border-radius: 12px; padding: 18px 24px; margin-bottom: 20px; }
.error-box.show { display: block; }
.error-box .title { color: #ff6b6b; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
.error-box pre { color: #cc8888; font-size: 11px; overflow-x: auto; }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .container { padding: 14px 10px; }
  .form-card { padding: 18px; }
  .form-group { min-width: 100%; }
  .usage-summary { gap: 12px; }
  .user-chip span.user-email { display: none; }
}
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────── -->
<div class="header">
  <div class="header-left">
    <h1><span>Trading</span>Agents</h1>
    <div class="subtitle" id="txt-subtitle"></div>
  </div>
  <div class="header-right">
    <div class="user-menu-wrap" id="user-menu-wrap">
      <div class="user-chip" id="user-chip" onclick="toggleUserMenu(event)">
        <div class="user-avatar" id="user-avatar"></div>
        <span id="user-name-display"></span>
      </div>
      <div class="user-dropdown" id="user-dropdown">
        <a href="/billing"><span class="menu-icon">&#9783;</span><span id="menu-billing"></span></a>
        <a href="/history"><span class="menu-icon">&#9776;</span><span id="menu-history"></span></a>
      </div>
    </div>
    <div class="lang-switch">
      <button id="btn-zh" onclick="setLang('zh')">ZH</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <a href="/api/auth/logout" class="btn-header" id="txt-logout"></a>
  </div>
</div>

<!-- ── Main container ─────────────────────────────── -->
<div class="container">

  <!-- Usage bar -->
  <div class="usage-bar" id="usage-bar" style="display:none">
    <div class="usage-summary">
      <div class="usage-item" id="usage-analyses"></div>
      <div class="usage-item" id="usage-tokens-in"></div>
      <div class="usage-item" id="usage-tokens-out"></div>
      <div class="usage-item" id="usage-llm-calls"></div>
      <div class="usage-toggle" id="usage-toggle" onclick="toggleHistory()"></div>
    </div>
    <div class="usage-history" id="usage-history">
      <table>
        <thead><tr id="history-thead"></tr></thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Form -->
  <div class="form-card">
    <div class="form-row">
      <div class="form-group" style="flex:2;min-width:180px;">
        <label id="lbl-ticker"></label>
        <input type="text" id="ticker" placeholder="e.g. NVDA, AAPL, TSLA" value="NVDA">
      </div>
      <div class="form-group">
        <label id="lbl-date"></label>
        <input type="date" id="trade-date">
      </div>
      <div class="form-group">
        <label id="lbl-depth"></label>
        <select id="depth">
          <option value="full" id="opt-full"></option>
          <option value="quick" id="opt-quick"></option>
        </select>
      </div>
      <div class="form-group">
        <label id="lbl-provider"></label>
        <select id="llm-provider">
          <option value="google" selected>Google Gemini</option>
        </select>
      </div>
      <div class="form-group" style="flex:0 0 auto;">
        <label>&nbsp;</label>
        <button class="btn-analyze" id="btn-analyze" onclick="startAnalysis()"></button>
      </div>
    </div>
  </div>

  <!-- Progress panel -->
  <div class="progress-panel" id="progress-panel">
    <div class="progress-header">
      <div class="progress-title" id="txt-progress"></div>
      <div class="progress-elapsed" id="elapsed"></div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box">
    <div class="title" id="txt-error-title"></div>
    <pre id="error-content"></pre>
  </div>

  <!-- Decision banner -->
  <div class="decision-banner" id="decision-banner">
    <div class="decision-label" id="txt-decision-label"></div>
    <div class="decision-value" id="decision-value"></div>
    <div class="decision-meta" id="decision-meta"></div>
  </div>

  <!-- Token usage (after result) -->
  <div class="token-bar" id="token-bar">
    <div class="token-item" id="tok-in"></div>
    <div class="token-item" id="tok-out"></div>
    <div class="token-item" id="tok-llm"></div>
    <div class="token-item" id="tok-tool"></div>
    <div class="token-item" id="tok-time"></div>
  </div>

  <!-- Download bar -->
  <div class="download-bar" id="download-bar">
    <span class="dl-label" id="txt-download"></span>
    <a class="btn-download" onclick="downloadMd()" id="btn-dl-md"></a>
    <a class="btn-download" onclick="downloadPdf()" id="btn-dl-pdf"></a>
  </div>

  <!-- Report -->
  <div class="report" id="report"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   i18n
   ═══════════════════════════════════════════════════════ */
const I18N = {
  zh: {
    subtitle: 'AI 驱动的多智能体股票分析',
    logout: '退出',
    ticker: '股票代码', date: '日期', depth: '分析深度', provider: 'LLM 模型',
    depthFull: '完整（全部分析师）', depthQuick: '快速（新闻+舆情）',
    analyze: '开始分析', analyzing: '分析中...',
    progress: '分析进度', decision: '交易决策',
    errorTitle: '分析出错',
    usageAnalyses: '分析次数', usageTokensIn: '输入 Token', usageTokensOut: '输出 Token',
    usageLlmCalls: 'LLM 调用', usageToggle: '历史明细',
    histDate: '日期', histTicker: '股票', histDecision: '决策',
    histTokens: 'Token (入/出)', histTime: '耗时', histModel: '模型',
    tokIn: '输入 Token', tokOut: '输出 Token', tokLlm: 'LLM 调用',
    tokTool: '工具调用', tokTime: '耗时',
    download: '下载报告', dlMd: '下载 Markdown', dlPdf: '下载 PDF',
    menuBilling: '我的账单', menuHistory: '历史分析',
  },
  en: {
    subtitle: 'AI-Powered Multi-Agent Stock Analysis',
    logout: 'Logout',
    ticker: 'Stock Ticker', date: 'Date', depth: 'Depth', provider: 'LLM Provider',
    depthFull: 'Full (all analysts)', depthQuick: 'Quick (news + sentiment)',
    analyze: 'Analyze', analyzing: 'Analyzing...',
    progress: 'Analysis Progress', decision: 'Trade Decision',
    errorTitle: 'Analysis Error',
    usageAnalyses: 'Analyses', usageTokensIn: 'Input Tokens', usageTokensOut: 'Output Tokens',
    usageLlmCalls: 'LLM Calls', usageToggle: 'History',
    histDate: 'Date', histTicker: 'Ticker', histDecision: 'Decision',
    histTokens: 'Tokens (In/Out)', histTime: 'Time', histModel: 'Model',
    tokIn: 'Input Tokens', tokOut: 'Output Tokens', tokLlm: 'LLM Calls',
    tokTool: 'Tool Calls', tokTime: 'Elapsed',
    download: 'Download Report', dlMd: 'Markdown (.md)', dlPdf: 'PDF (.pdf)',
    menuBilling: 'My Billing', menuHistory: 'Analysis History',
  }
};

// Agent & stage name translations
const NAMES = {
  // stages
  'analysts':    { zh: '数据分析', en: 'Data Analysis' },
  'research':    { zh: '研究辩论', en: 'Research Debate' },
  'trading':     { zh: '交易方案', en: 'Trading Plan' },
  'risk':        { zh: '风险评估', en: 'Risk Assessment' },
  'decision':    { zh: '最终决策', en: 'Final Decision' },
  // agents
  'Market Analyst':       { zh: '市场分析师', en: 'Market Analyst' },
  'Social Analyst':       { zh: '舆情分析师', en: 'Social Analyst' },
  'News Analyst':         { zh: '新闻分析师', en: 'News Analyst' },
  'Fundamentals Analyst': { zh: '基本面分析师', en: 'Fundamentals Analyst' },
  'Bull Researcher':      { zh: '多头研究员', en: 'Bull Researcher' },
  'Bear Researcher':      { zh: '空头研究员', en: 'Bear Researcher' },
  'Research Manager':     { zh: '研究主管', en: 'Research Manager' },
  'Trader':               { zh: '交易员', en: 'Trader' },
  'Aggressive Debater':   { zh: '激进派', en: 'Aggressive View' },
  'Conservative Debater': { zh: '保守派', en: 'Conservative View' },
  'Neutral Debater':      { zh: '中立派', en: 'Neutral View' },
  'Risk Manager':         { zh: '风险主管', en: 'Risk Manager' },
  'Portfolio Manager':    { zh: '投资组合经理', en: 'Portfolio Manager' },
  // report section titles
  'Analyst Reports':       { zh: '分析师报告', en: 'Analyst Reports' },
  'Research Team':         { zh: '研究团队', en: 'Research Team' },
  'Trading Plan':          { zh: '交易方案', en: 'Trading Plan' },
  'Risk Assessment':       { zh: '风险评估', en: 'Risk Assessment' },
  'Final Trade Decision':  { zh: '最终交易决策', en: 'Final Trade Decision' },
  // report agent names
  'Aggressive View':  { zh: '激进观点', en: 'Aggressive View' },
  'Conservative View':{ zh: '保守观点', en: 'Conservative View' },
  'Neutral View':     { zh: '中立观点', en: 'Neutral View' },
};

let lang = localStorage.getItem('ta_lang') || 'zh';
function t(k) { return (I18N[lang] || I18N.zh)[k] || k; }
function n(name) { return (NAMES[name] || {})[lang] || name; }

function setLang(l) {
  lang = l;
  localStorage.setItem('ta_lang', l);
  applyI18n();
  // Re-render timeline if present
  if (currentPipeline) renderTimeline(currentPipeline);
}

function applyI18n() {
  document.getElementById('txt-subtitle').textContent = t('subtitle');
  document.getElementById('txt-logout').textContent = t('logout');
  document.getElementById('lbl-ticker').textContent = t('ticker');
  document.getElementById('lbl-date').textContent = t('date');
  document.getElementById('lbl-depth').textContent = t('depth');
  document.getElementById('lbl-provider').textContent = t('provider');
  document.getElementById('opt-full').textContent = t('depthFull');
  document.getElementById('opt-quick').textContent = t('depthQuick');
  document.getElementById('btn-analyze').textContent = analysisRunning ? t('analyzing') : t('analyze');
  document.getElementById('txt-progress').textContent = t('progress');
  document.getElementById('txt-error-title').textContent = t('errorTitle');
  document.getElementById('txt-decision-label').textContent = t('decision');
  document.getElementById('usage-toggle').textContent = t('usageToggle');
  document.getElementById('menu-billing').textContent = t('menuBilling');
  document.getElementById('menu-history').textContent = t('menuHistory');
  document.getElementById('txt-download').textContent = t('download');
  document.getElementById('btn-dl-md').textContent = t('dlMd');
  document.getElementById('btn-dl-pdf').textContent = t('dlPdf');
  // lang buttons
  document.getElementById('btn-zh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
  // Refresh usage bar if data loaded
  if (cachedUserInfo) renderUsageBar(cachedUserInfo.usage);
}

/* ═══════════════════════════════════════════════════════
   User info & usage
   ═══════════════════════════════════════════════════════ */
let cachedUserInfo = null;

async function fetchUserInfo() {
  try {
    const resp = await fetch('/api/user/info');
    if (!resp.ok) return;
    cachedUserInfo = await resp.json();
    renderUserChip(cachedUserInfo);
    renderUsageBar(cachedUserInfo.usage);
  } catch (e) { /* ignore */ }
}

function renderUserChip(info) {
  const chip = document.getElementById('user-chip');
  const avatar = document.getElementById('user-avatar');
  const nameEl = document.getElementById('user-name-display');

  const displayName = info.name || info.email || 'User';
  if (info.avatar) {
    avatar.innerHTML = '<img src="' + escapeAttr(info.avatar) + '" alt="">';
  } else {
    avatar.textContent = displayName.charAt(0).toUpperCase();
  }
  // Always show email
  const email = info.email || '';
  if (email) {
    nameEl.innerHTML = escapeHtml(displayName) + ' <span class="user-email" style="color:#666;font-size:11px;">' + escapeHtml(email) + '</span>';
  } else {
    nameEl.textContent = displayName;
  }
  chip.style.display = 'flex';
  document.getElementById('user-menu-wrap').className = 'user-menu-wrap show';
}

function toggleUserMenu(e) {
  e.stopPropagation();
  document.getElementById('user-dropdown').classList.toggle('open');
}
// Close dropdown when clicking outside
document.addEventListener('click', function() {
  document.getElementById('user-dropdown').classList.remove('open');
});

function renderUsageBar(usage) {
  if (!usage) return;
  const bar = document.getElementById('usage-bar');
  bar.style.display = 'block';
  document.getElementById('usage-analyses').innerHTML = '<b>' + usage.total_analyses + '</b> ' + t('usageAnalyses');
  document.getElementById('usage-tokens-in').innerHTML = '<b>' + fmtNum(usage.total_tokens_in) + '</b> ' + t('usageTokensIn');
  document.getElementById('usage-tokens-out').innerHTML = '<b>' + fmtNum(usage.total_tokens_out) + '</b> ' + t('usageTokensOut');
  document.getElementById('usage-llm-calls').innerHTML = '<b>' + fmtNum(usage.total_llm_calls) + '</b> ' + t('usageLlmCalls');

  // History table
  const records = usage.records || [];
  const thead = document.getElementById('history-thead');
  thead.innerHTML = ['histDate','histTicker','histDecision','histTokens','histTime','histModel']
    .map(k => '<th>' + t(k) + '</th>').join('');
  const tbody = document.getElementById('history-tbody');
  tbody.innerHTML = records.slice().reverse().map(r => {
    const dec = (r.decision || '').replace(/[^A-Z]/g, '');
    const d = dec.includes('BUY') ? 'BUY' : dec.includes('SELL') ? 'SELL' : 'HOLD';
    const secs = Math.round((r.elapsed_ms || 0) / 1000);
    return '<tr>'
      + '<td>' + (r.trade_date || '') + '</td>'
      + '<td>' + (r.ticker || '') + '</td>'
      + '<td class="dec-' + d + '">' + d + '</td>'
      + '<td>' + fmtNum(r.tokens_in) + ' / ' + fmtNum(r.tokens_out) + '</td>'
      + '<td>' + secs + 's</td>'
      + '<td>' + (r.model || '') + '</td>'
      + '</tr>';
  }).join('');
}

function toggleHistory() {
  document.getElementById('usage-history').classList.toggle('open');
}

/* ═══════════════════════════════════════════════════════
   Analysis progress timeline
   ═══════════════════════════════════════════════════════ */
let currentPipeline = null;    // stages array from server
let completedAgents = new Set();
let analysisRunning = false;
let timer = null;

function renderTimeline(stages) {
  currentPipeline = stages;
  const container = document.getElementById('timeline');
  container.innerHTML = '';

  for (const stage of stages) {
    const stageEl = document.createElement('div');
    stageEl.className = 'tl-stage';
    stageEl.dataset.stage = stage.id;

    // Determine stage status
    const allDone = stage.agents.every(a => completedAgents.has(a));
    const anyDone = stage.agents.some(a => completedAgents.has(a));
    const cls = allDone ? 'done' : anyDone ? 'active' : '';

    stageEl.innerHTML = '<div class="tl-stage-header ' + cls + '">' + n(stage.id) + '</div>';

    for (const agent of stage.agents) {
      const done = completedAgents.has(agent);
      // Determine if this agent is the "next" one (first pending in an active stage)
      let isActive = false;
      if (!done && anyDone && !allDone) {
        // First not-done agent in this stage
        const firstPending = stage.agents.find(a => !completedAgents.has(a));
        isActive = (firstPending === agent);
      }
      // Also mark the very first agent of the very first non-done stage as active if analysis is running
      if (!done && !anyDone && analysisRunning) {
        const firstPendingStage = stages.find(s => !s.agents.every(a => completedAgents.has(a)));
        if (firstPendingStage === stage) {
          const firstPending = stage.agents.find(a => !completedAgents.has(a));
          isActive = (firstPending === agent);
        }
      }

      const agentEl = document.createElement('div');
      agentEl.className = 'tl-agent' + (done ? ' done' : isActive ? ' active' : '');
      agentEl.dataset.agent = agent;

      let icon;
      if (done) icon = '<div class="tl-icon"><div class="tl-icon-done">&#10003;</div></div>';
      else if (isActive) icon = '<div class="tl-icon"><div class="tl-icon-active"></div></div>';
      else icon = '<div class="tl-icon"><div class="tl-icon-pending"></div></div>';

      agentEl.innerHTML = icon + '<div><div class="tl-name">' + n(agent) + '</div>'
        + (done && agentPreviews[agent] ? '<div class="tl-preview">' + escapeHtml(agentPreviews[agent]) + '</div>' : '')
        + '</div>';
      stageEl.appendChild(agentEl);
    }
    container.appendChild(stageEl);
  }
}

let agentPreviews = {};

function handleProgress(data) {
  completedAgents.add(data.agent);
  if (data.preview) agentPreviews[data.agent] = data.preview.substring(0, 120);
  if (currentPipeline) renderTimeline(currentPipeline);
}

/* ═══════════════════════════════════════════════════════
   Analysis
   ═══════════════════════════════════════════════════════ */
function startAnalysis() {
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  if (!ticker) { alert('Please enter a stock ticker'); return; }

  const tradeDate = document.getElementById('trade-date').value;
  const depth = document.getElementById('depth').value;
  const llmProvider = document.getElementById('llm-provider').value;

  // Reset
  analysisRunning = true;
  completedAgents = new Set();
  agentPreviews = {};
  currentPipeline = null;
  const btn = document.getElementById('btn-analyze');
  btn.disabled = true;
  btn.textContent = t('analyzing');
  document.getElementById('progress-panel').className = 'progress-panel active';
  document.getElementById('timeline').innerHTML = '';
  document.getElementById('elapsed').textContent = '';
  document.getElementById('decision-banner').className = 'decision-banner';
  document.getElementById('report').className = 'report';
  document.getElementById('report').innerHTML = '';
  document.getElementById('error-box').className = 'error-box';
  document.getElementById('token-bar').className = 'token-bar';
  document.getElementById('download-bar').className = 'download-bar';

  // Timer
  const startTime = Date.now();
  timer = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    document.getElementById('elapsed').textContent = m > 0 ? m + 'm ' + (s % 60) + 's' : s + 's';
  }, 1000);

  // SSE
  fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ticker, trade_date: tradeDate, depth, llm_provider: llmProvider, language: lang })
  }).then(response => {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    function read() {
      reader.read().then(({ done, value }) => {
        if (done) { finish(); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              handleEvent(data, ticker, tradeDate);
            } catch (e) {}
          }
        }
        read();
      });
    }
    read();
  }).catch(err => {
    showError(err.message, '');
    finish();
  });
}

function handleEvent(data) {
  if (data.type === 'pipeline') {
    renderTimeline(data.stages);
  } else if (data.type === 'status') {
    // status messages during init — no separate status bar needed, timeline covers it
  } else if (data.type === 'progress') {
    handleProgress(data);
  } else if (data.type === 'result') {
    renderReport(data.report, data.decision);
    if (data.usage) renderTokenBar(data.usage);
    // Refresh usage bar
    fetchUserInfo();
  } else if (data.type === 'error') {
    showError(data.message, data.traceback || '');
  } else if (data.type === 'done') {
    finish();
  }
}

function renderTokenBar(usage) {
  const bar = document.getElementById('token-bar');
  bar.className = 'token-bar show';
  document.getElementById('tok-in').innerHTML = t('tokIn') + ': <b>' + fmtNum(usage.tokens_in) + '</b>';
  document.getElementById('tok-out').innerHTML = t('tokOut') + ': <b>' + fmtNum(usage.tokens_out) + '</b>';
  document.getElementById('tok-llm').innerHTML = t('tokLlm') + ': <b>' + (usage.llm_calls || 0) + '</b>';
  document.getElementById('tok-tool').innerHTML = t('tokTool') + ': <b>' + (usage.tool_calls || 0) + '</b>';
  const secs = Math.round((usage.elapsed_ms || 0) / 1000);
  const m = Math.floor(secs / 60);
  document.getElementById('tok-time').innerHTML = t('tokTime') + ': <b>' + (m > 0 ? m + 'm ' + (secs % 60) + 's' : secs + 's') + '</b>';
}

let lastReport = null;  // store for download

function renderMarkdown(text) {
  if (typeof marked !== 'undefined' && marked.parse) {
    try { return marked.parse(text || ''); } catch(e) {}
  }
  // Fallback: basic formatting if marked.js not loaded
  return escapeHtml(text).replace(/\n/g, '<br>');
}

function renderReport(report, decision) {
  lastReport = report;

  // Decision banner
  const clean = (decision || '').replace(/[^A-Z]/g, '');
  const d = clean.includes('BUY') ? 'BUY' : clean.includes('SELL') ? 'SELL' : 'HOLD';
  const banner = document.getElementById('decision-banner');
  banner.className = 'decision-banner show ' + d;
  document.getElementById('decision-value').textContent = d;
  document.getElementById('decision-meta').textContent = report.ticker + ' | ' + report.date;

  // Show download bar
  document.getElementById('download-bar').className = 'download-bar show';

  // Sections
  const container = document.getElementById('report');
  container.innerHTML = '';
  container.className = 'report show';

  for (const section of report.sections) {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML =
      '<div class="section-header" onclick="toggleSection(this)">'
      + '<div class="section-title">' + n(section.title) + '</div>'
      + '<div class="section-arrow">&#9654;</div>'
      + '</div>'
      + '<div class="section-body">'
      + section.items.map(item =>
          '<div class="item">'
          + '<div class="item-name">' + n(item.name) + '</div>'
          + '<div class="item-content">' + renderMarkdown(item.content) + '</div>'
          + '</div>'
        ).join('')
      + '</div>';
    container.appendChild(sec);
  }

  // Auto-expand first
  const first = container.querySelector('.section-header');
  if (first) toggleSection(first);
}

/* ═══════════════════════════════════════════════════════
   Download
   ═══════════════════════════════════════════════════════ */
function buildMarkdownText() {
  if (!lastReport) return '';
  const r = lastReport;
  let md = '# ' + r.ticker + ' Analysis Report (' + r.date + ')\n\n';
  md += '**Decision: ' + (r.decision || '').toUpperCase() + '**\n\n---\n\n';
  for (const section of r.sections) {
    md += '## ' + section.title + '\n\n';
    for (const item of section.items) {
      md += '### ' + item.name + '\n\n';
      md += (item.content || '') + '\n\n';
    }
  }
  return md;
}

function downloadMd() {
  const md = buildMarkdownText();
  if (!md) return;
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = lastReport.ticker + '_' + lastReport.date + '_report.md';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadPdf() {
  if (!lastReport) return;
  // Build a clean HTML document for print-to-PDF
  const r = lastReport;
  const dec = (r.decision || '').replace(/[^A-Z]/g, '');
  const d = dec.includes('BUY') ? 'BUY' : dec.includes('SELL') ? 'SELL' : 'HOLD';
  const decColor = d === 'BUY' ? '#2d8a6e' : d === 'SELL' ? '#d44' : '#b8a020';

  let html = '';
  for (const section of r.sections) {
    html += '<h2 style="color:#333;border-bottom:1px solid #ddd;padding-bottom:4px;margin-top:24px">' + escapeHtml(section.title) + '</h2>';
    for (const item of section.items) {
      html += '<h3 style="color:#555;margin:14px 0 6px">' + escapeHtml(item.name) + '</h3>';
      html += '<div style="font-size:13px;line-height:1.8;color:#333">' + renderMarkdown(item.content) + '</div>';
    }
  }

  const win = window.open('', '_blank');
  if (!win) { alert('Please allow popups for PDF download'); return; }
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<title>' + r.ticker + ' Report</title>'
    + '<style>'
    + 'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:800px;margin:0 auto;padding:32px 24px;color:#333;font-size:14px;line-height:1.7}'
    + 'h1{font-size:22px;margin-bottom:4px}'
    + 'h2{font-size:17px}'
    + 'h3{font-size:14px}'
    + 'table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}'
    + 'th,td{border:1px solid #ddd;padding:6px 10px;text-align:left}'
    + 'th{background:#f5f5f5}'
    + 'blockquote{border-left:3px solid #4ecdc4;padding:6px 14px;margin:8px 0;color:#666}'
    + 'code{background:#f0f0f0;padding:1px 5px;border-radius:3px;font-size:12px}'
    + 'pre{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:6px;padding:12px;overflow-x:auto}'
    + 'pre code{background:none;padding:0}'
    + 'ul,ol{padding-left:22px}'
    + 'hr{border:none;border-top:1px solid #ddd;margin:16px 0}'
    + '@media print{body{padding:0}}'
    + '</style></head><body>'
    + '<h1>' + escapeHtml(r.ticker) + ' Analysis Report</h1>'
    + '<p style="color:#888;margin-bottom:4px">' + r.date + '</p>'
    + '<div style="display:inline-block;background:' + decColor + ';color:#fff;padding:4px 18px;border-radius:6px;font-size:18px;font-weight:700;margin:10px 0 20px">' + d + '</div>'
    + html
    + '<hr><p style="color:#aaa;font-size:11px;margin-top:20px">Generated by TradingAgents | trading.agentpit.io</p>'
    + '</body></html>');
  win.document.close();
  // Give browser a moment to render, then trigger print dialog
  setTimeout(() => { win.print(); }, 600);
}

function toggleSection(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function showError(msg, tb) {
  document.getElementById('error-box').className = 'error-box show';
  document.getElementById('error-content').textContent = msg + (tb ? '\n\n' + tb : '');
}

function finish() {
  clearInterval(timer);
  analysisRunning = false;
  // Keep progress panel visible so user can review the timeline
  const btn = document.getElementById('btn-analyze');
  btn.disabled = false;
  btn.textContent = t('analyze');
}

/* ═══════════════════════════════════════════════════════
   Utilities
   ═══════════════════════════════════════════════════════ */
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}
function escapeAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function fmtNum(n) {
  if (n == null) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

/* ═══════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════ */
document.getElementById('trade-date').value = new Date().toISOString().split('T')[0];
applyI18n();
fetchUserInfo();
</script>
