<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents - AI Stock Analysis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 20px 40px; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 24px; color: #fff; }
.header h1 span { color: #4ecdc4; }
.header .subtitle { color: #888; font-size: 13px; margin-top: 4px; }

/* Main */
.container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

/* Form */
.form-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 28px; margin-bottom: 24px; }
.form-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
.form-group { flex: 1; min-width: 140px; }
.form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 14px; background: #0f1117; border: 1px solid #333; border-radius: 8px;
  color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: #4ecdc4; }
.form-group input::placeholder { color: #555; }

.btn-analyze {
  padding: 10px 32px; background: linear-gradient(135deg, #4ecdc4, #44a08d); color: #fff; border: none;
  border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  white-space: nowrap; height: 42px;
}
.btn-analyze:hover { opacity: 0.85; }
.btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

/* Status */
.status-bar { display: none; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px 28px; margin-bottom: 24px; }
.status-bar.active { display: flex; align-items: center; gap: 14px; }
.spinner { width: 24px; height: 24px; border: 3px solid #333; border-top-color: #4ecdc4; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.status-text { color: #aaa; font-size: 14px; }
.elapsed { margin-left: auto; color: #666; font-size: 13px; font-variant-numeric: tabular-nums; }

/* Decision banner */
.decision-banner { display: none; border-radius: 12px; padding: 24px 28px; margin-bottom: 24px; text-align: center; }
.decision-banner.show { display: block; }
.decision-banner.BUY { background: linear-gradient(135deg, #1a3a2a, #0f2a1a); border: 1px solid #2d6a4f; }
.decision-banner.SELL { background: linear-gradient(135deg, #3a1a1a, #2a0f0f); border: 1px solid #6a2d2d; }
.decision-banner.HOLD { background: linear-gradient(135deg, #3a3a1a, #2a2a0f); border: 1px solid #6a6a2d; }
.decision-label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
.decision-value { font-size: 36px; font-weight: 700; margin-top: 4px; }
.decision-banner.BUY .decision-value { color: #4ecdc4; }
.decision-banner.SELL .decision-value { color: #ff6b6b; }
.decision-banner.HOLD .decision-value { color: #ffd93d; }
.decision-meta { color: #888; font-size: 14px; margin-top: 8px; }

/* Report */
.report { display: none; }
.report.show { display: block; }
.section { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.section-header {
  padding: 16px 24px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  user-select: none; transition: background 0.2s;
}
.section-header:hover { background: #222244; }
.section-title { font-size: 16px; font-weight: 600; }
.section-arrow { color: #666; transition: transform 0.2s; }
.section-header.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; border-top: 1px solid #2a2a4a; }
.section-body.open { display: block; }
.item { padding: 20px 24px; border-bottom: 1px solid #1f1f3a; }
.item:last-child { border-bottom: none; }
.item-name { font-size: 13px; font-weight: 600; color: #4ecdc4; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.item-content { font-size: 14px; line-height: 1.7; color: #ccc; white-space: pre-wrap; word-wrap: break-word; }
.item-content h1, .item-content h2, .item-content h3 { color: #fff; margin: 16px 0 8px; }
.item-content strong { color: #fff; }
.item-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.item-content th, .item-content td { padding: 8px 12px; border: 1px solid #333; text-align: left; font-size: 13px; }
.item-content th { background: #222; color: #4ecdc4; }

/* Error */
.error-box { display: none; background: #2a0f0f; border: 1px solid #6a2d2d; border-radius: 12px; padding: 20px 28px; margin-bottom: 24px; }
.error-box.show { display: block; }
.error-box .title { color: #ff6b6b; font-weight: 600; margin-bottom: 8px; }
.error-box pre { color: #cc8888; font-size: 12px; overflow-x: auto; }

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 16px 20px; }
  .container { padding: 16px 12px; }
  .form-card { padding: 20px; }
  .form-group { min-width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span>Trading</span>Agents</h1>
    <div class="subtitle">AI-Powered Multi-Agent Stock Analysis</div>
  </div>
  <a href="/api/auth/logout" style="color:#888; font-size:13px; text-decoration:none; padding:8px 16px; border:1px solid #333; border-radius:6px; transition: color 0.2s, border-color 0.2s;" onmouseover="this.style.color='#fff';this.style.borderColor='#4ecdc4'" onmouseout="this.style.color='#888';this.style.borderColor='#333'">退出</a>
</div>

<div class="container">
  <div class="form-card">
    <div class="form-row">
      <div class="form-group" style="flex:2; min-width:200px;">
        <label>Stock Ticker</label>
        <input type="text" id="ticker" placeholder="e.g. NVDA, AAPL, TSLA" value="NVDA">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="trade-date">
      </div>
      <div class="form-group">
        <label>Depth</label>
        <select id="depth">
          <option value="full">Full (all analysts)</option>
          <option value="quick">Quick (news + sentiment)</option>
        </select>
      </div>
      <div class="form-group">
        <label>LLM Provider</label>
        <select id="llm-provider">
          <option value="google" selected>Google Gemini</option>
        </select>
      </div>
      <div class="form-group" style="flex:0 0 auto;">
        <label>&nbsp;</label>
        <button class="btn-analyze" id="btn-analyze" onclick="startAnalysis()">Analyze</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="spinner"></div>
    <div class="status-text" id="status-text">Initializing...</div>
    <div class="elapsed" id="elapsed"></div>
  </div>

  <div class="error-box" id="error-box">
    <div class="title">Analysis Error</div>
    <pre id="error-content"></pre>
  </div>

  <div class="decision-banner" id="decision-banner">
    <div class="decision-label">Decision</div>
    <div class="decision-value" id="decision-value"></div>
    <div class="decision-meta" id="decision-meta"></div>
  </div>

  <div class="report" id="report"></div>
</div>

<script>
// Set default date to today
document.getElementById('trade-date').value = new Date().toISOString().split('T')[0];

let timer = null;

function startAnalysis() {
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  if (!ticker) { alert('Please enter a stock ticker'); return; }

  const tradeDate = document.getElementById('trade-date').value;
  const depth = document.getElementById('depth').value;
  const llmProvider = document.getElementById('llm-provider').value;

  // Reset UI
  const btn = document.getElementById('btn-analyze');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  document.getElementById('status-bar').className = 'status-bar active';
  document.getElementById('status-text').textContent = 'Connecting...';
  document.getElementById('decision-banner').className = 'decision-banner';
  document.getElementById('report').className = 'report';
  document.getElementById('report').innerHTML = '';
  document.getElementById('error-box').className = 'error-box';

  // Timer
  const startTime = Date.now();
  timer = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    document.getElementById('elapsed').textContent = m > 0 ? `${m}m ${s%60}s` : `${s}s`;
  }, 1000);

  // SSE request
  fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ticker, trade_date: tradeDate, depth, llm_provider: llmProvider })
  }).then(response => {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function read() {
      reader.read().then(({ done, value }) => {
        if (done) { finish(); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              handleEvent(data, ticker, tradeDate);
            } catch (e) {}
          }
        }
        read();
      });
    }
    read();
  }).catch(err => {
    showError(err.message, '');
    finish();
  });
}

function handleEvent(data, ticker, tradeDate) {
  if (data.type === 'status') {
    document.getElementById('status-text').textContent = data.message;
  } else if (data.type === 'result') {
    renderReport(data.report, data.decision);
  } else if (data.type === 'error') {
    showError(data.message, data.traceback || '');
  } else if (data.type === 'done') {
    finish();
  }
}

function renderReport(report, decision) {
  // Decision banner
  const clean = (decision || '').replace(/[^A-Z]/g, '');
  const d = clean.includes('BUY') ? 'BUY' : clean.includes('SELL') ? 'SELL' : 'HOLD';
  const banner = document.getElementById('decision-banner');
  banner.className = `decision-banner show ${d}`;
  document.getElementById('decision-value').textContent = d;
  document.getElementById('decision-meta').textContent = `${report.ticker} | ${report.date}`;

  // Sections
  const container = document.getElementById('report');
  container.innerHTML = '';
  container.className = 'report show';

  for (const section of report.sections) {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">${section.title}</div>
        <div class="section-arrow">&#9654;</div>
      </div>
      <div class="section-body">
        ${section.items.map(item => `
          <div class="item">
            <div class="item-name">${item.name}</div>
            <div class="item-content">${escapeHtml(item.content)}</div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(sec);
  }

  // Auto-expand first section
  const first = container.querySelector('.section-header');
  if (first) toggleSection(first);
}

function toggleSection(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function showError(msg, tb) {
  document.getElementById('error-box').className = 'error-box show';
  document.getElementById('error-content').textContent = msg + (tb ? '\n\n' + tb : '');
}

function finish() {
  clearInterval(timer);
  document.getElementById('status-bar').className = 'status-bar';
  const btn = document.getElementById('btn-analyze');
  btn.disabled = false;
  btn.textContent = 'Analyze';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}
</script>
</body>
</html>
